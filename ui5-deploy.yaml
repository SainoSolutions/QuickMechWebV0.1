# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: zmcwiseprdapp
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/** 
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration: 
        target:
          destination: EDS
          url: http://ppcuser:443
        app:
          name: ZMC_WISE_PRDAPP
          description: Wise Production Application
          package: ZEMAMI
          transport:   EDSK9B0A8A
        exclude:
          - /test/
